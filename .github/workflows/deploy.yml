name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # `vite.config.ts` reads GITHUB_REPOSITORY to derive `/<repo>/` as base.
        run: npm run build

      - name: Make SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v6
        with:
          # Auto-enable GitHub Pages (with "GitHub Actions" as the source)
          # the first time this workflow runs on a repo, so a fresh clone/fork
          # doesn't have to manually flip the switch in Settings → Pages.
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
